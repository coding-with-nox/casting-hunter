# Debug — standalone compose (non richiede docker-compose.yml)
#
# Avvio:
#   docker compose -f docker-compose.debug.yml up -d --build
#
# Caratteristiche:
#  - Build target=build (stage SDK, nessun publish/stripping)
#  - Sorgenti montati live (.:/src) con dotnet watch
#  - bin/ e obj/ isolati per container tramite named volumes
#    (evita il file-lock su deps.json quando api e worker buildano in parallelo)
#  - VSDBG remote debugger (API: 2222, Worker: 2223)
#  - Adminer GUI DB su porta 8090
#  - PostgreSQL esposto su 5432
#  - Log level Debug, auto-scrape disabilitato sull'API

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: castingradar
      POSTGRES_USER: castingradar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-castingradar_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U castingradar"]
      interval: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/CastingRadar.Api/Dockerfile
      target: build
      args:
        CONFIGURATION: Debug
    command: >
      dotnet watch run
        --project /src/src/CastingRadar.Api/CastingRadar.Api.csproj
        --no-hot-reload
        --no-launch-profile
    volumes:
      - .:/src:delegated
      - ~/.nuget/packages:/root/.nuget/packages
      - vsdbg:/vsdbg:ro
      # Volumi isolati per bin/obj: evitano il file-lock con il worker
      # sui progetti condivisi (Infrastructure, Application, Domain)
      - api-bin-api:/src/src/CastingRadar.Api/bin
      - api-obj-api:/src/src/CastingRadar.Api/obj
      - infra-bin-api:/src/src/CastingRadar.Infrastructure/bin
      - infra-obj-api:/src/src/CastingRadar.Infrastructure/obj
      - app-bin-api:/src/src/CastingRadar.Application/bin
      - app-obj-api:/src/src/CastingRadar.Application/obj
      - domain-bin-api:/src/src/CastingRadar.Domain/bin
      - domain-obj-api:/src/src/CastingRadar.Domain/obj
    ports:
      - "5050:8080"
      - "2222:22"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      UsePostgres: "true"
      ConnectionStrings__DefaultConnection: "Host=db;Database=castingradar;Username=castingradar;Password=${DB_PASSWORD:-castingradar_secret}"
      CastingRadar__Telegram__BotToken: "${TELEGRAM_BOT_TOKEN:-}"
      CastingRadar__Telegram__ChatId: "${TELEGRAM_CHAT_ID:-}"
      CastingRadar__ScrapingIntervalHours: "0"
      Logging__LogLevel__Default: Debug
      Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: Information
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: src/CastingRadar.Worker/Dockerfile
      target: build
      args:
        CONFIGURATION: Debug
    command: >
      dotnet watch run
        --project /src/src/CastingRadar.Worker/CastingRadar.Worker.csproj
        --no-hot-reload
    volumes:
      - .:/src:delegated
      - ~/.nuget/packages:/root/.nuget/packages
      - vsdbg:/vsdbg:ro
      # Volumi separati dai corrispettivi dell'api
      - worker-bin-worker:/src/src/CastingRadar.Worker/bin
      - worker-obj-worker:/src/src/CastingRadar.Worker/obj
      - infra-bin-worker:/src/src/CastingRadar.Infrastructure/bin
      - infra-obj-worker:/src/src/CastingRadar.Infrastructure/obj
      - app-bin-worker:/src/src/CastingRadar.Application/bin
      - app-obj-worker:/src/src/CastingRadar.Application/obj
      - domain-bin-worker:/src/src/CastingRadar.Domain/bin
      - domain-obj-worker:/src/src/CastingRadar.Domain/obj
    ports:
      - "2223:22"
    environment:
      DOTNET_ENVIRONMENT: Development
      UsePostgres: "true"
      ConnectionStrings__DefaultConnection: "Host=db;Database=castingradar;Username=castingradar;Password=${DB_PASSWORD:-castingradar_secret}"
      CastingRadar__Telegram__BotToken: "${TELEGRAM_BOT_TOKEN:-}"
      CastingRadar__Telegram__ChatId: "${TELEGRAM_CHAT_ID:-}"
      CastingRadar__ScrapingIntervalHours: "1"
      Logging__LogLevel__Default: Debug
    depends_on:
      db:
        condition: service_healthy

  vsdbg-installer:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    volumes:
      - vsdbg:/vsdbg
    command: >
      bash -c "
        if [ ! -f /vsdbg/vsdbg ]; then
          curl -sSL https://aka.ms/getvsdbgsh |
            bash /dev/stdin -v latest -l /vsdbg
        fi
      "
    restart: "no"

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  vsdbg:
  # api — bin/obj isolati per progetto
  api-bin-api:
  api-obj-api:
  infra-bin-api:
  infra-obj-api:
  app-bin-api:
  app-obj-api:
  domain-bin-api:
  domain-obj-api:
  # worker — bin/obj isolati per progetto
  worker-bin-worker:
  worker-obj-worker:
  infra-bin-worker:
  infra-obj-worker:
  app-bin-worker:
  app-obj-worker:
  domain-bin-worker:
  domain-obj-worker:
